name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: social-app-projectm
          # No build step needed - this is a pure static site (public: "." in firebase.json)
          # The action will deploy the contents of the repo root as configured in firebase.json

      - name: Deployment info
        run: |
          echo "✅ Deployed to Firebase Hosting"
          echo "Live URL: https://social-app-projectm.web.app"
